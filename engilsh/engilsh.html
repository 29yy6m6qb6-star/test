<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>英語辞典</title>

<style>
body {
  font-family: sans-serif;
  margin:20px;
  background:#f5f5f5;
}

h1 { text-align:center; }

#search {
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
}

#list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.word {
  font-size: 24px;
  font-weight: bold;
}

/* ダークモード */
@media (prefers-color-scheme: dark) {
  body { background: #121212; color: #eee; }
  #search { background: #1e1e1e; color: #fff; border: 1px solid #333;}
  .card { background: #1e1e1e; }
}

@font-face {
  font-family: "Klee";
  src: url("KleeOne.ttf") format("truetype");
}

body {
  font-family: "Klee", sans-serif;
}

.card {
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

.popup {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
}

.popup-content {
  background:white;
  margin: 10% auto;
  padding:20px;
  width: 50%;        /* 画面の50% */
  max-width: 800px;  /* 最大サイズ制限 */
  border-radius:10px;
  height: 40%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

#close {
  float:right;
  font-size:20px;
  cursor:pointer;
}

@media (prefers-color-scheme: dark) {
  .popup-content {
    background: #1e1e1e;
    color: #fff;
  }
}
</style>
</head>

<body>

<h1>📘 英語辞典</h1>

<input type="text" id="search" placeholder="単語・意味・品詞で検索">

<div id="list"></div>

<script src="eiken 3 1350.js"></script>
<script src="new horizon 1.js"></script>

<div id="popup" class="popup">
  <div class="popup-content">
    <span id="close">&times;</span>
    <div id="popup-body"></div>
  </div>
</div>

<script>
const list = document.getElementById("list");
const search = document.getElementById("search");

//補う
const merged = {};

[...eikenData, ...nh1Data].forEach(item => {

  const key =
  item.word.trim() + "_" +
  (item.pos || "") + "_" +
  (item.meaning || "");

  if (!merged[key]) {
    merged[key] = { ...item };
  } else {
    if (!merged[key].meaning && item.meaning) {
      merged[key].meaning = item.meaning;
    }
  }

});

const wordData = Object.values(merged);

// 表示
function display(items){
  list.innerHTML = items.map((w,i) => `
    <div class="card" onclick="showPopup(${i})"
      style="border-left: 5px solid ${getColor(w.pos)}">
      <div class="word">${w.word}</div>
      <p>意味: ${w.meaning}</p>
      <p>品詞: ${w.pos}</p>
    </div>
  `).join("");

  window.currentItems = items; // ←これ重要
}



// 検索
search.addEventListener("input", () => {
  const keyword = search.value.toLowerCase();

  const filtered = wordData.filter(w =>
    w.word.toLowerCase().includes(keyword) ||
    w.meaning.includes(keyword) ||
    (w.pos || "").includes(keyword)
  );

  display(filtered);
});

// 初期表示
display(wordData);

function getColor(pos){
  if(!pos) return "#4CAF50"; // 空対策

  if(pos.includes("動詞")) return "#2196F3";
  if(pos.includes("名詞")) return "#FF9800";
  if(pos.includes("形容詞")) return "#9C27B0";
  if(pos.includes("副詞")) return "#009688";

  return "#4CAF50";
}

const popup = document.getElementById("popup");
const popupBody = document.getElementById("popup-body");
const closeBtn = document.getElementById("close");

function showPopup(index){
  const w = window.currentItems[index];

  popupBody.innerHTML = `
    <h2>${w.word}</h2>
    <p>意味: ${w.meaning}</p>
    <p>品詞: ${w.pos}</p>
    <hr>
    <p>例文: ${w.example}</p>
    <p>　訳: ${w.example_jp}</p>
  `;

  popup.style.display = "block";
}

// 閉じる
closeBtn.onclick = () => popup.style.display = "none";

// 背景クリックで閉じる
window.onclick = (e) => {
  if(e.target == popup){
    popup.style.display = "none";
  }
}

</script>
</body>
</html>
