<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>英語辞典 Safari9対応版</title>

<style>
body {
  margin: 20px;
  background: #f5f5f5;
  font-family: sans-serif;
}

h1 {
  text-align: center;
}

#search {
  display: block;
  width: 300px;
  margin: 10px auto;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

#list {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  width: 220px;
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);

  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

.word {
  font-size: 24px;
  font-weight: bold;
}

/* popup */

.popup {
  display: none;
  position: fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:999;
}

.popup-content {
  background:white;
  width:80%;
  max-width:700px;
  margin:50px auto;
  padding:20px;
  border-radius:10px;
  box-sizing:border-box;
}

#close {
  float:right;
  font-size:24px;
  cursor:pointer;
}

/* dark mode */

@media (prefers-color-scheme: dark) {

  body {
    background:#121212;
    color:#eee;
  }

  #search {
    background:#1e1e1e;
    color:white;
    border:1px solid #333;
  }

  .card {
    background:#1e1e1e;
  }

  .popup-content {
    background:#1e1e1e;
    color:white;
  }

}

</style>
</head>

<body>

<h1>📘 英語辞典</h1>

<input type="text" id="search" placeholder="単語・意味・品詞で検索">

<div id="list"></div>

<!-- popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span id="close">&times;</span>
    <div id="popup-body"></div>
  </div>
</div>

<!-- JS -->
<script src="eiken 3 1350.js"></script>
<script src="new horizon 1.js"></script>

<script>

var list = document.getElementById("list");
var search = document.getElementById("search");

var popup = document.getElementById("popup");
var popupBody = document.getElementById("popup-body");
var closeBtn = document.getElementById("close");

/* ======================
   データ統合
====================== */

var merged = {};

eikenData.concat(nh1Data).forEach(function(item){

  var key =
    (item.word || "").trim() + "_" +
    (item.pos || "") + "_" +
    (item.meaning || "");

  if(!merged[key]){

    merged[key] = {
      word: item.word || "",
      meaning: item.meaning || "",
      pos: item.pos || "",
      example: item.example || "",
      example_jp: item.example_jp || ""
    };

  } else {

    if(!merged[key].meaning && item.meaning){
      merged[key].meaning = item.meaning;
    }

    if(!merged[key].example && item.example){
      merged[key].example = item.example;
    }

    if(!merged[key].example_jp && item.example_jp){
      merged[key].example_jp = item.example_jp;
    }

  }

});

var wordData = [];

for(var key in merged){
  wordData.push(merged[key]);
}

/* ======================
   色
====================== */

function getColor(pos){

  if(!pos){
    return "#4CAF50";
  }

  if(pos.indexOf("動詞") !== -1){
    return "#2196F3";
  }

  if(pos.indexOf("名詞") !== -1){
    return "#FF9800";
  }

  if(pos.indexOf("形容詞") !== -1){
    return "#9C27B0";
  }

  if(pos.indexOf("副詞") !== -1){
    return "#009688";
  }

  return "#4CAF50";
}

/* ======================
   表示
====================== */

function display(items){

  var html = "";

  items.forEach(function(w, i){

    html +=
      '<div class="card" onclick="showPopup(' + i + ')" ' +
      'style="border-left:5px solid ' + getColor(w.pos) + ';">' +

      '<div class="word">' + escapeHtml(w.word) + '</div>' +

      '<p>意味: ' + escapeHtml(w.meaning) + '</p>' +

      '<p>品詞: ' + escapeHtml(w.pos) + '</p>' +

      '</div>';

  });

  list.innerHTML = html;

  window.currentItems = items;
}

/* ======================
   検索
====================== */

search.addEventListener("input", function(){

  var keyword = search.value.toLowerCase();

  var filtered = wordData.filter(function(w){

    return (
      (w.word || "").toLowerCase().indexOf(keyword) !== -1 ||
      (w.meaning || "").indexOf(keyword) !== -1 ||
      (w.pos || "").indexOf(keyword) !== -1
    );

  });

  display(filtered);

});

/* ======================
   popup
====================== */

function showPopup(index){

  var w = window.currentItems[index];

  popupBody.innerHTML =

    "<h2>" + escapeHtml(w.word) + "</h2>" +

    "<p><strong>意味:</strong> " +
    escapeHtml(w.meaning) + "</p>" +

    "<p><strong>品詞:</strong> " +
    escapeHtml(w.pos) + "</p>" +

    "<hr>" +

    "<p><strong>例文:</strong><br>" +
    escapeHtml(w.example) + "</p>" +

    "<p><strong>訳:</strong><br>" +
    escapeHtml(w.example_jp) + "</p>";

  popup.style.display = "block";
}

closeBtn.onclick = function(){
  popup.style.display = "none";
};

window.onclick = function(event){

  if(event.target === popup){
    popup.style.display = "none";
  }

};

/* ======================
   XSS対策
====================== */

function escapeHtml(str){

  if(!str){
    return "";
  }

  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* 初期表示 */

display(wordData);

</script>

</body>
</html>
