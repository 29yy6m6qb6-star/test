<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>限定ページ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }

    #content {
      display: none;
      margin-top: 30px;
    }

    .box {
      padding: 20px;
      border: 2px solid #333;
      display: inline-block;
      border-radius: 10px;
    }

    a {
      display: block;
      margin-top: 10px;
      font-size: 18px;
      color: blue;
    }
  </style>

  <script>
    function login() {
      const password = prompt("パスワードを入力してください");

      // ←ここがパスワード
      if (password === "friend123") {
        document.getElementById("content").style.display = "block";
        document.getElementById("loginBox").style.display = "none";
      } else {
        alert("パスワードが違います");
        document.body.innerHTML = "<h1>アクセス拒否</h1>";
      }
    }

    window.onload = login;
  </script>
</head>

<body>

  <h1>🔒 限定コンテンツ</h1>

  <div id="loginBox" class="box">
    <p>パスワード認証中...</p>
  </div>

  <div id="content" class="box">
    <h2>🎉 アクセス成功</h2>

    <p>ここからダウンロードできます👇</p>

    <!-- ZIPやPDFをGitHubに置いてリンク -->
    <a href="secret.zip" download>📦 ZIPファイル</a>
    <a href="secret.pdf" download>📄 PDFファイル</a>
  </div>

</body>
</html>
